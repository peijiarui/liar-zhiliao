# =============================================================================
# Liar Zhiliao - Local Development Environment
# =============================================================================
# Usage:
#   docker compose -f docker/local-dev.yml up -d
#   docker compose -f docker/local-dev.yml down
#
# To enable Elasticsearch, uncomment the `elasticsearch` service block below
# and uncomment the `depends_on` reference in the network comment section.
#
# To verify all services are healthy:
#   docker compose -f docker/local-dev.yml ps
# =============================================================================

networks:
  zhiliao-net:
    name: zhiliao-net
    driver: bridge

volumes:
  postgres-data:
    name: zhiliao-postgres-data
    driver: local
  redis-data:
    name: zhiliao-redis-data
    driver: local
  minio-data:
    name: zhiliao-minio-data
    driver: local
  rabbitmq-data:
    name: zhiliao-rabbitmq-data
    driver: local
  etcd-data:
    name: zhiliao-etcd-data
    driver: local
  milvus-data:
    name: zhiliao-milvus-data
    driver: local
  milvus-minio-data:
    name: zhiliao-milvus-minio-data
    driver: local

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Main Business Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: zhiliao-postgres
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zhiliao
      POSTGRES_USER: zhiliao
      POSTGRES_PASSWORD: zhiliao123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhiliao -d zhiliao"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis Stack - Session Memory & Caching (includes RedisInsight capabilities)
  # ---------------------------------------------------------------------------
  redis:
    image: redis/redis-stack:latest
    container_name: zhiliao-redis
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "6379:6379"
      - "8001:8001"           # RedisInsight web UI (optional, local dev only)
    environment:
      # No password set for local development
      REDIS_ARGS: "--save 60 1000 --appendonly yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO - S3-Compatible Object Storage (Document Store)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: zhiliao-minio
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "9000:9000"           # S3 API
      - "9001:9001"           # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Create the required bucket after MinIO starts
  minio-init:
    image: minio/mc:latest
    container_name: zhiliao-minio-init
    restart: "no"
    networks:
      - zhiliao-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add zhiliao http://minio:9000 minioadmin minioadmin123) do echo 'Waiting for MinIO...' && sleep 2; done;
      /usr/bin/mc mb zhiliao/zhiliao-docs --ignore-existing;
      /usr/bin/mc policy set public zhiliao/zhiliao-docs;
      echo 'Bucket zhiliao-docs created successfully.';
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # RabbitMQ - Async Task Queue (Message Broker)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: zhiliao-rabbitmq
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "5672:5672"           # AMQP
      - "15672:15672"         # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: zhiliao
      RABBITMQ_DEFAULT_PASS: zhiliao123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_alive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Milvus Standalone - Vector Database
  # ---------------------------------------------------------------------------
  # Milvus standalone mode requires etcd (metadata storage) and an internal
  # MinIO (data storage). The official Milvus docker-compose splits these into
  # three cooperating containers.
  # ---------------------------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: zhiliao-milvus-etcd
    restart: unless-stopped
    networks:
      - zhiliao-net
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: >
      etcd
      --data-dir=/etcd
      --listen-client-urls=http://0.0.0.0:2379
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-peer-urls=http://0.0.0.0:2380
      --initial-advertise-peer-urls=http://0.0.0.0:2380
      --initial-cluster=default=http://0.0.0.0:2380
      --initial-cluster-token=etcd-cluster
      --initial-cluster-state=new
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  milvus-minio:
    image: minio/minio:latest
    container_name: zhiliao-milvus-minio
    restart: unless-stopped
    networks:
      - zhiliao-net
    # Expose Milvus MinIO ports only if you need direct debugging
    # ports:
    #   - "9002:9000"
    #   - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - milvus-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  milvus:
    image: milvusdb/milvus:latest
    container_name: zhiliao-milvus
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "19530:19530"         # gRPC
      # - "9091:9091"         # HTTP API (optional, uncomment if needed)
    environment:
      # External etcd endpoint (disables embedded etcd automatically)
      ETCD_ENDPOINTS: etcd:2379
      # External MinIO address (disables embedded MinIO automatically)
      MINIO_ADDRESS: milvus-minio:9000
      # Object storage configuration
      common__storageType: "minio"
      minio__bucketName: "zhiliao-milvus-bucket"
      minio__accessKeyID: "minioadmin"
      minio__secretAccessKey: "minioadmin123"
      # Milvus internal segment storage
      minio__useSSL: "false"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection & Alerting
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: zhiliao-prometheus
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Grafana - Metrics & Logs Visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: zhiliao-grafana
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 192M

  # ---------------------------------------------------------------------------
  # Loki - Log Aggregation
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: zhiliao-loki
    restart: unless-stopped
    networks:
      - zhiliao-net
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/loki-config.yml
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Promtail - Log Shipper (scrapes app logs, ships to Loki)
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: zhiliao-promtail
    restart: unless-stopped
    networks:
      - zhiliao-net
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - ../logs:/var/log/zhiliao
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # ---------------------------------------------------------------------------
