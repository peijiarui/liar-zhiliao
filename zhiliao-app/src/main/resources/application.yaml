server:
  port: 8080

spring:
#  main:
#    allow-circular-references: true
  application:
    name: liar-zhiliao
  data:
    redis:
      host: ${RESOURCE_SERVER_HOST}
      port: 6379
      password: ${RESOURCE_SERVER_PASSWORD}
  datasource:
    url: jdbc:postgresql://${RESOURCE_SERVER_HOST}:5432/zhiliao?useUnicode=true&characterEncoding=utf8
    username: peijiarui
    password: ${RESOURCE_SERVER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${RESOURCE_SERVER_HOST}
    port: 5672
    username: peijiarui
    password: ${RESOURCE_SERVER_PASSWORD}
    virtual-host: /
    listener:
      simple:
        concurrency: 1
        max-concurrency: 3

# langchain4j 相关配置
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-v4-flash
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-v4-flash
      log-requests: true
      log-responses: true
    embedding-model:
      base-url: https://llm-kyz5903txm3fyz8f.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY}
      model-name: text-embedding-v4
      log-requests: true
      log-responses: true
  milvus:
    host: ${RESOURCE_SERVER_HOST}
    port: 19530
    collection-name: zhiliao_chunks
    username: peijiarui
    password: ${RESOURCE_SERVER_PASSWORD}
#  community:
#    redis:
#      host: ${RESOURCE_SERVER_HOST}
#      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    dev.langchain4j: debug
#    org.springframework.context.support.DefaultListableBeanFactory: debug

# zhiliao custom config
zhiliao:
  retrieval:
    store-type: milvus  # milvus (default) or in-memory
  minio:
    endpoint: http://${RESOURCE_SERVER_HOST}:9000
    access-key: peijiarui
    secret-key: ${RESOURCE_SERVER_PASSWORD}
    bucket: zhiliao-docs
  rabbitmq:
    queue: zhiliao.document.process
