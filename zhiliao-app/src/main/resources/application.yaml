server:
  port: 8080

spring:
  autoconfigure:
    exclude: dev.langchain4j.spring.LangChain4jAutoConfig # 排除 LangChain4jAutoConfig，这个自动配置类会似的RagAutoConfig注入COntentRetriever时出现重复导致报错
  application:
    name: liar-zhiliao
  data:
    redis:
      host: ${RESOURCE_SERVER_HOST}
      port: 6379
      password: ${RESOURCE_SERVER_PASSWORD}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD_HOST:localhost}:8858
        # 应用心跳端口，dashboard 通过此端口拉取应用数据
        port: 8719
        # Docker 环境下 dashboard 需通过 host.docker.internal 回连应用
        client-ip: ${SENTINEL_CLIENT_IP:}
      eager: true
  datasource:
    url: jdbc:postgresql://${RESOURCE_SERVER_HOST}:5432/zhiliao?useUnicode=true&characterEncoding=utf8
    username: peijiarui
    password: ${RESOURCE_SERVER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${RESOURCE_SERVER_HOST}
    port: 5672
    username: peijiarui
    password: ${RESOURCE_SERVER_PASSWORD}
    virtual-host: /
    listener:
      simple:
        concurrency: 1
        max-concurrency: 3

# langchain4j 相关配置
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-v4-flash
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-v4-flash
      log-requests: true
      log-responses: true
    embedding-model:
      base-url: https://llm-kyz5903txm3fyz8f.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY}
      model-name: text-embedding-v4
      max-segments-per-batch: 10
      log-requests: true
      log-responses: true
  milvus:
    host: ${RESOURCE_SERVER_HOST}
    port: 19530
    collection-name: zhiliao_chunks
    username: peijiarui
    password: ${RESOURCE_SERVER_PASSWORD}
#    dimension: 1024
#  community:
#    redis:
#      host: ${RESOURCE_SERVER_HOST}
#      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    dev.langchain4j: debug
    org.liar.zhiliao.retrieval: debug
#    org.springframework.context.support.DefaultListableBeanFactory: debug

# zhiliao custom config
zhiliao:
  minio:
    endpoint: http://${RESOURCE_SERVER_HOST}:9000
    access-key: peijiarui
    secret-key: ${RESOURCE_SERVER_PASSWORD}
    bucket: zhiliao-docs
  rabbitmq:
    queue: zhiliao.document.process
  auth:
    app-id: zhiliao                         # SSO 应用标识，预留多应用
    access-token-ttl-seconds: 900           # 15 min
    refresh-token-ttl-seconds: 604800       # 7 day
    oauth-state-ttl-seconds: 300            # 5 min
    web-frontend-base-url: ${WEB_FRONTEND_BASE_URL:http://localhost:5173}

# OAuth2 登录配置
oauth2:
  github:
    client-id: ${GITHUB_CLIENT_ID:Ov23liOn92VGSxEUXAL1}
    client-secret: ${GITHUB_CLIENT_SECRET:6819718894767529b40e0da777f30e1ff5ffe471}
    redirect-uri: http://localhost:8080/oauth2/github/callback
  dingtalk:
    client-id: ${DINGTALK_APP_ID:dingh4zgqi7zjajy3f3e}
    client-secret: ${DINGTALK_APP_SECRET:smiAHbtUG41JilkacNoOMT53jSmAgkpBUDmegD0-Zh_KoIquD4btzBVnYhCo4CmM}
    redirect-uri: http://localhost:8080/oauth2/dingtalk/callback
  wechat:
    # 预留，暂不启用
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    redirect-uri: http://localhost:8080/oauth2/wechat/callback

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: zhiliao
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

log:
  aspect:
    enabled: true
#    log-ip: true # 开启的话会从请求头获取请求的ip
    expression: execution(* org.liar.zhiliao.*.controller..*.*(..)) && !within(org.liar.zhiliao.chat.controller.ChatController)
